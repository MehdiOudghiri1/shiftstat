site_name: ShiftStat
site_description: Scientific tools for reliability under tabular distribution shift
repo_url: https://github.com/open-source-labs/shiftstat
theme:
  name: material
  palette:
    primary: blue grey
    accent: teal
nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Scientific Motivation: theory.md
  - Detection: detection.md
  - Reweighting: reweighting.md
  - Calibration Under Shift: calibration.md
  - Reliability Diagnostics: reliability.md
  - Certified Worst-Group Audits: certified_worst_group_audits.md
  - Why Aggregate Metrics Can Hide Failures: aggregate_failures.md
  - Subgroup Reliability Analysis: subgroup.md
  - Conditional Auditing Under Shift: audit.md
  - Selective Prediction Under Shift: selective_prediction.md
  - Abstention Policies And Tradeoffs: abstention_tradeoffs.md
  - Risk-Coverage Analysis: risk_coverage.md
  - When Abstention Helps And Misleads: abstention_limits.md
  - Practical Deployment Guidance: deployment_guidance.md
  - Known Limitations: known_limitations.md
  - Benchmarking Guide: benchmarking.md
  - Experiment Configuration Guide: experiment_configuration.md
  - Reproducibility Guide: reproducibility.md
  - Testing And CI: testing_and_ci.md
  - API Stability: api_stability.md
  - Release Process: release_process.md
  - Publication Workflow Guide: publication_workflow.md
  - Generating Tables And Figures: paper_artifacts.md
  - Scientific Case Studies: scientific_case_studies.md
  - Slice Discovery Methodology: slice_discovery.md
  - Interpreting Diagnostics Responsibly: responsible_diagnostics.md
  - Model Evaluation Workflows: workflows.md
  - Reliability Theory Notes: reliability_theory.md
  - User Guide: user_guide.md
  - Examples Gallery: examples.md
  - API Reference:
      - Overview: api/index.md
      - Audit: api/audit.md
      - Bench: api/bench.md
      - Calibration: api/calibration.md
      - Certification: api/certification.md
      - Detection: api/detect.md
      - Experiments: api/experiments.md
      - Metrics: api/metrics.md
      - Reliability: api/reliability.md
      - Reweighting: api/reweight.md
      - Selective: api/selective.md
      - Subgroup: api/subgroup.md
      - Utilities: api/utils.md
  - Contributing: contributing.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
