version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-tooling:
        patterns:
          - pytest*
          - coverage*
          - ruff
          - mypy
          - mkdocs*
          - build
          - twine

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
