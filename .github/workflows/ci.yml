name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-tests:
    name: Fast tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run fast tests
        run: python -m pytest -m "not slow"

  coverage:
    name: Full coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,examples]
      - name: Run full test suite with coverage
        run: >
          python -m pytest
          --cov=shiftstat
          --cov-report=term-missing
          --cov-report=xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Lint
        run: python -m ruff check .

  type-check:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Type check
        run: python -m mypy src

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[docs]
      - name: Build docs
        run: python -m mkdocs build --strict

  package:
    name: Build and install wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[release]
          python -m build
      - name: Smoke install wheel
        run: |
          python -m venv /tmp/shiftstat-wheel-smoke
          /tmp/shiftstat-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/shiftstat-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/shiftstat-wheel-smoke/bin/python -c "import shiftstat; print(shiftstat.__version__)"
          /tmp/shiftstat-wheel-smoke/bin/shiftstat-experiment --help
